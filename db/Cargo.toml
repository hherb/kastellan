[package]
name        = "hhagent-db"
description = "Postgres bring-up: idempotent initdb + UDS-only config + per-user data dir."
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
authors.workspace      = true
repository.workspace   = true
readme.workspace       = true

[dependencies]
serde      = { workspace = true }
serde_json = { workspace = true }
thiserror  = { workspace = true }
tracing    = { workspace = true }

# Async runtime + Postgres driver. The pure helpers in `lib.rs` (the
# `build_*` functions, `find_pg_bin_dir`, etc.) do NOT depend on these,
# but the runtime probe (`probe::run`) does â€” it talks Postgres over a
# UDS, runs `sqlx::migrate!()` against the embedded `migrations/` dir,
# and writes the bring-up `audit_log` row.
tokio = { workspace = true }
sqlx  = { workspace = true }
time  = { workspace = true }
sha2  = { workspace = true }

# AES-256-GCM authenticated encryption for the `secrets` table runtime.
# `getrandom` (default) gives us `aead::OsRng` for fresh nonce
# generation; `zeroize` wires key+cipher state to wipe on drop.
aes-gcm = { workspace = true }

# Wipe sensitive buffers on drop. Public secret-getter return type is
# `Zeroizing<Vec<u8>>` so a downstream `format!("{:?}", plaintext)` or
# panic-unwind cannot leave material behind.
zeroize = { workspace = true }

# Per-OS keyring backends for `OsKeyringProvider` (the production
# wrapping-key store). See workspace `Cargo.toml` for the rationale
# behind the per-target split. Tests use `MapKeyProvider`; CI never
# exercises the real keyring (no daemon in headless containers).
[target.'cfg(target_os = "linux")'.dependencies]
# `async-secret-service` uses `zbus` (pure-Rust D-Bus) instead of
# `dbus-secret-service` / `libdbus-sys`, avoiding a `libdbus-1-dev`
# system-package dependency at compile time. `crypto-rust` keeps
# the encryption side pure-Rust too (no `openssl-sys`). The
# `tokio` feature lets keyring's internals integrate with our
# runtime so a blocking `Entry::get_secret()` from inside an
# async task does not deadlock the executor. License chain:
# keyring (MIT/Apache-2.0) â†’ secret-service (MIT/Apache-2.0) â†’
# zbus (MIT) â€” all AGPL-compatible.
keyring = { version = "3", default-features = false, features = ["async-secret-service", "tokio", "crypto-rust"] }

[target.'cfg(target_os = "macos")'.dependencies]
keyring = { version = "3", default-features = false, features = ["apple-native"] }

# Driver entry point â€” small CLI that creates the user-instance data dir,
# runs `initdb` once, and writes our `postgresql.auto.conf` overrides on
# top. Pure helpers in `lib.rs` are exercised independently via unit tests
# (no Postgres binaries required).
[[bin]]
name = "hhagent-db-init"
path = "src/bin/hhagent-db-init.rs"

[dev-dependencies]
# Integration test in `tests/postgres_e2e.rs` drives the real `postgres`
# binary through the user-level supervisor (systemd --user on Linux,
# launchd LaunchAgent on macOS) and then connects over the UDS to issue
# a `SELECT 1`. Skips with a `[SKIP]` line when Postgres is not on the
# host (mirrors the sandbox/supervisor smoke-test pattern).
hhagent-supervisor = { path = "../supervisor" }
